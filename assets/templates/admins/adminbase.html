{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="Energy Management System — Admin Panel">
    <meta name="author" content="xAI">
    <title>{% block title %}EMS — Admin Panel{% endblock %}</title>

    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

    <style>
        :root {
            --navy-900: #050d1a;
            --navy-800: #0a1628;
            --navy-700: #0f2040;
            --cyan-primary: #00c8ff;
            --cyan-dark: #0096cc;
            --cyan-glow: rgba(0,200,255,0.3);
            --emerald: #10e880;
            --emerald-glow: rgba(16,232,128,0.3);
            --text-primary: #e8f4ff;
            --text-secondary: #8ab4d4;
            --text-muted: #4a7599;
            --border-subtle: rgba(0,200,255,0.12);
            --glass-bg: rgba(10,22,40,0.88);
        }

        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: var(--navy-900);
            color: var(--text-primary);
            margin: 0; padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,255,0.035) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: -20%;
            left: -15%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,200,255,0.07) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
            animation: orb-float 16s ease-in-out infinite;
        }

        @keyframes orb-float {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(30px, -25px); }
        }

        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        .navbar-ems {
            position: sticky;
            top: 0;
            z-index: 1050;
            background: rgba(5,13,26,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.75rem 0;
            transition: all 0.4s ease;
        }

        .navbar-ems.scrolled {
            background: rgba(5,13,26,0.98);
            border-bottom-color: rgba(0,200,255,0.22);
            box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }

        .navbar-brand-ems {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--cyan-primary), var(--emerald));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--navy-900);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 0 15px var(--cyan-glow);
        }

        .navbar-brand-ems:hover .brand-icon {
            transform: rotate(10deg) scale(1.1);
            box-shadow: 0 0 25px var(--cyan-glow);
        }

        .brand-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cyan-primary);
            letter-spacing: 1px;
            text-shadow: 0 0 15px var(--cyan-glow);
            line-height: 1.1;
        }

        .brand-badge {
            display: inline-block;
            background: rgba(0,200,255,0.1);
            border: 1px solid rgba(0,200,255,0.2);
            color: var(--cyan-primary);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .brand-sub {
            font-size: 0.58rem;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            display: block;
        }

        .navbar-toggler-ems {
            border: 1px solid var(--border-subtle);
            background: transparent;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .navbar-toggler-ems:hover {
            border-color: var(--cyan-primary);
            background: rgba(0,200,255,0.06);
        }

        .navbar-toggler-ems .icon-bar {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-secondary);
            margin: 4px 0;
            border-radius: 2px;
        }

        .nav-ems {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            list-style: none;
            margin: 0; padding: 0;
        }

        .nav-ems .nav-item .nav-link {
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
        }

        .nav-ems .nav-item .nav-link::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--cyan-primary);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .nav-ems .nav-item .nav-link:hover,
        .nav-ems .nav-item.active .nav-link {
            color: var(--cyan-primary);
            background: rgba(0,200,255,0.07);
        }

        .nav-ems .nav-item .nav-link:hover::after,
        .nav-ems .nav-item.active .nav-link::after { width: 60%; }

        .btn-logout {
            background: transparent;
            border: 1.5px solid rgba(255,80,80,0.35);
            color: #ff8080 !important;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.5rem 1.2rem;
            border-radius: 25px;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255,80,80,0.08);
            border-color: rgba(255,80,80,0.6);
            transform: translateY(-1px);
        }

        /* ── Main ── */
        .main-content { flex: 1; padding: 40px 0 80px; }

        /* ── Footer ── */
        .footer-ems {
            background: rgba(5,13,26,0.95);
            border-top: 1px solid var(--border-subtle);
            padding: 1.75rem 0;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .footer-links a {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin: 0 12px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--cyan-primary);
            transform: translateY(-3px) scale(1.15);
            text-shadow: 0 0 12px var(--cyan-glow);
        }

        .footer-ems p { color: var(--text-muted); font-size: 0.78rem; margin: 0.5rem 0 0; }

        .scroll-top {
            position: fixed;
            bottom: 30px; right: 30px;
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--cyan-primary), var(--emerald));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--navy-900);
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 4px 20px var(--cyan-glow);
            transition: all 0.3s ease;
            opacity: 0; transform: translateY(10px);
            z-index: 999;
        }

        .scroll-top.visible { opacity: 1; transform: translateY(0); }
        .scroll-top:hover { transform: translateY(-4px); color: var(--navy-900); }

        /* ── Loader ── */
        .page-loader {
            position: fixed;
            inset: 0;
            background: var(--navy-900);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.loaded { opacity: 0; visibility: hidden; }

        .loader-ring {
            width: 48px; height: 48px;
            border: 3px solid var(--border-subtle);
            border-top-color: var(--cyan-primary);
            border-right-color: var(--emerald);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Glass Card (shared) ── */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.4s ease, border-color 0.4s ease;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--cyan-primary), var(--emerald));
        }

        .glass-card:hover {
            border-color: rgba(0,200,255,0.22);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px var(--cyan-glow);
        }

        /* ── Responsive ── */
        @media (max-width: 991px) {
            .navbar-collapse-ems {
                background: rgba(5,13,26,0.98);
                border: 1px solid var(--border-subtle);
                border-radius: 16px;
                padding: 1.25rem;
                margin-top: 0.75rem;
            }
            .nav-ems { flex-direction: column; align-items: flex-start; }
            .nav-ems .nav-item { width: 100%; }
            .nav-ems .nav-item .nav-link { display: block; }
        }
    </style>
</head>
<body>

<div class="page-loader" id="pageLoader">
    <div class="loader-ring"></div>
</div>

<canvas id="particles-canvas"></canvas>

<div class="page-wrapper">

    <!-- NAVBAR -->
    <nav class="navbar-ems" id="mainNav">
        <div class="container-xl">
            <div class="d-flex justify-content-between align-items-center">
                <!-- Brand -->
                <a href="{% url 'AdminHome' %}" class="navbar-brand-ems">
                    <div class="brand-icon">
                        <i class="fas fa-shield-halved"></i>
                    </div>
                    <div>
                        <span class="brand-text">EMS 
                            <span class="brand-badge">Admin</span>
                            <span class="brand-sub">Control Panel</span>
                        </span>
                    </div>
                </a>

                <!-- Nav Links + Actions -->
                <div class="d-flex align-items-center">
                    <div class="collapse navbar-collapse-ems" id="navbarCollapse">
                        <ul class="nav-ems">
                            <li class="nav-item {% block admin_home %}{% endblock %}">
                                <a class="nav-link" href="{% url 'AdminHome' %}">
                                    <i class="fas fa-gauge me-1 opacity-75"></i>Dashboard
                                </a>
                            </li>
                            <li class="nav-item {% block user_list %}{% endblock %}">
                                <a class="nav-link" href="{% url 'ViewRegisteredUsers' %}">
                                    <i class="fas fa-users me-1 opacity-75"></i>Users
                                </a>
                            </li>
                        </ul>
                    </div>

                    <!-- Always Visible Logout -->
                    <a class="btn-logout ms-lg-3 ms-2" href="{% url 'logout' %}">
                        <i class="fas fa-right-from-bracket me-1"></i>Logout
                    </a>

                    <!-- Mobile Toggle -->
                    <button class="navbar-toggler-ems d-lg-none ms-3" id="navToggle">
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main class="main-content">
        <div class="container-xl">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer-ems">
        <div class="container">
            <div class="footer-links mb-2">
                <a href="https://x.ai" target="_blank"><i class="fas fa-globe"></i></a>
                <a href="mailto:support@x.ai"><i class="fas fa-envelope"></i></a>
                <a href="https://twitter.com/xAI" target="_blank"><i class="fab fa-x-twitter"></i></a>
            </div>
            <p>© 2026 xAI Energy Management System. All rights reserved.</p>
        </div>
    </footer>
</div>

<a href="#" class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/jquery-3.5.1.min.js' %}"></script>

<script>
    window.addEventListener('load', () => { setTimeout(() => document.getElementById('pageLoader').classList.add('loaded'), 300); });

    const nav = document.getElementById('mainNav');
    const scrollBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
        scrollBtn.classList.toggle('visible', window.scrollY > 200);
    });

    document.getElementById('navToggle')?.addEventListener('click', () => {
        document.getElementById('navbarCollapse').classList.toggle('show');
    });

    scrollBtn?.addEventListener('click', e => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); });

    (function () {
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let P = [];
        const N = 55;
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        for (let i = 0; i < N; i++) {
            P.push({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.8 + .4, vx: (Math.random() - .5) * .4, vy: (Math.random() - .5) * .4, a: Math.random() * .35 + .08 });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            P.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0,200,255,${p.a})`; ctx.fill();
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
            });
            for (let i = 0; i < P.length; i++) for (let j = i+1; j < P.length; j++) {
                const dx = P[i].x - P[j].x, dy = P[i].y - P[j].y, d = Math.sqrt(dx*dx+dy*dy);
                if (d < 110) { ctx.beginPath(); ctx.strokeStyle = `rgba(0,200,255,${.07*(1-d/110)})`; ctx.lineWidth = .5; ctx.moveTo(P[i].x,P[i].y); ctx.lineTo(P[j].x,P[j].y); ctx.stroke(); }
            }
            requestAnimationFrame(draw);
        }
        draw();
    })();
</script>
</body>
</html>
